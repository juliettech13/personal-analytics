name: Sync Instagram Analytics

# Runs every 6 hours (~120 min/month on free tier)
on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:        # also triggerable manually from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit data files back to the repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Instagram data & save
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
        run: |
          python3 - << 'EOF'
          import json, datetime, urllib.request, os, pathlib, sys

          TOKEN = os.environ['IG_TOKEN']
          BASE  = 'https://graph.facebook.com/v22.0'

          def api_get(path, optional=False, **params):
              params['access_token'] = TOKEN
              qs = '&'.join(f'{k}={v}' for k, v in params.items())
              url = f'{BASE}{path}?{qs}'
              try:
                  with urllib.request.urlopen(url, timeout=15) as r:
                      data = json.loads(r.read())
              except urllib.error.HTTPError as e:
                  body = e.read().decode('utf-8', errors='replace')
                  if optional:
                      print(f'  ⚠ (optional) HTTP {e.code} on {path}: {body[:300]}')
                      return {}
                  print(f'HTTP {e.code} on {path}:\n{body}', file=sys.stderr)
                  sys.exit(1)
              except Exception as e:
                  if optional:
                      print(f'  ⚠ (optional) request failed on {path}: {e}')
                      return {}
                  print(f'Request failed on {path}: {e}', file=sys.stderr)
                  sys.exit(1)
              if 'error' in data:
                  err = data['error']
                  if optional:
                      print(f'  ⚠ (optional) Graph API error on {path}: code={err.get("code")} — {err.get("message")}')
                      return {}
                  print(f'Graph API error on {path}:\n  code={err.get("code")} type={err.get("type")}\n  message={err.get("message")}', file=sys.stderr)
                  sys.exit(1)
              return data

          # ── Discover Instagram Business Account ID ───────────────────────────
          pages_resp = api_get('/me/accounts',
                               fields='id,name,instagram_business_account')
          ig_user_id = None
          for page in pages_resp.get('data', []):
              ig_biz = page.get('instagram_business_account')
              if ig_biz and ig_biz.get('id'):
                  ig_user_id = ig_biz['id']
                  print(f'Found Instagram Business Account {ig_user_id} via page "{page["name"]}"')
                  break

          if not ig_user_id:
              print('ERROR: No Instagram Business Account found.', file=sys.stderr)
              print(f'  Pages visible: {[p.get("name") for p in pages_resp.get("data", [])]}', file=sys.stderr)
              sys.exit(1)

          # ── Profile ──────────────────────────────────────────────────────────
          profile = api_get(f'/{ig_user_id}',
                            fields='id,username,followers_count,follows_count,biography,website,profile_picture_url')
          followers   = profile.get('followers_count', 0)
          following   = profile.get('follows_count', 0)
          username    = profile.get('username', '_juliettech')
          biography   = profile.get('biography', '')
          website     = profile.get('website', '')
          profile_pic = profile.get('profile_picture_url', '')
          print(f'@{username}: {followers:,} followers · {following:,} following')

          # ── Account-level insights (last 7 days, daily period) ────────────────
          # reach, profile_views, website_clicks, accounts_engaged, follows_and_unfollows
          acct_ins = api_get(f'/{ig_user_id}/insights',
                             optional=True,
                             metric='reach,profile_views,website_clicks,accounts_engaged,follows_and_unfollows',
                             period='day',
                             since=int((datetime.datetime.utcnow() - datetime.timedelta(days=7)).timestamp()),
                             until=int(datetime.datetime.utcnow().timestamp()))
          acct_metrics = {}
          for item in acct_ins.get('data', []):
              vals = item.get('values', [])
              # Sum the last 7 days for a weekly total
              acct_metrics[item['name']] = sum(v.get('value', 0) for v in vals)
          if acct_metrics:
              print(f'Account (7d): reach={acct_metrics.get("reach",0):,}  profile_views={acct_metrics.get("profile_views",0):,}  website_clicks={acct_metrics.get("website_clicks",0):,}')

          # ── Recent media ─────────────────────────────────────────────────────
          media_resp = api_get(
              f'/{ig_user_id}/media',
              fields='id,caption,media_type,media_product_type,timestamp,like_count,comments_count,permalink,thumbnail_url,is_shared_to_feed',
              limit=20
          )

          posts = []
          for m in media_resp.get('data', []):
              media_type   = m.get('media_type', '')
              product_type = m.get('media_product_type', 'FEED')
              is_reel      = product_type == 'REELS'
              is_video     = media_type == 'VIDEO'

              post = {
                  'id':                 m['id'],
                  'date':               m.get('timestamp', '')[:10],
                  'type':               media_type,
                  'product_type':       product_type,
                  'caption':            (m.get('caption') or '')[:300],
                  'likes':              m.get('like_count', 0),
                  'comments':           m.get('comments_count', 0),
                  'url':                m.get('permalink', ''),
                  'thumbnail_url':      m.get('thumbnail_url', ''),
                  'is_shared_to_feed':  m.get('is_shared_to_feed', False),
                  # Insight fields — populated below
                  'reach':              0,
                  'saves':              0,
                  'shares':             0,
                  'total_interactions': 0,
                  'profile_visits':     0,
                  'follows':            0,
                  # Video/Reel-specific
                  'plays':              0,
                  'avg_watch_time_ms':  0,
              }

              # Base insights (all media types, v22+ compatible)
              ins = api_get(f'/{m["id"]}/insights',
                            metric='reach,saved,shares,total_interactions',
                            period='lifetime')
              for item in ins.get('data', []):
                  key = 'saves' if item['name'] == 'saved' else item['name']
                  val = item.get('value') or ((item.get('values') or [{}])[-1].get('value', 0))
                  post[key] = val or 0

              # profile_visits + follows — only supported for some media types (optional)
              pv_ins = api_get(f'/{m["id"]}/insights',
                               optional=True,
                               metric='profile_visits,follows',
                               period='lifetime')
              for item in pv_ins.get('data', []):
                  val = item.get('value') or ((item.get('values') or [{}])[-1].get('value', 0))
                  post[item['name']] = val or 0

              # Reel-specific insights (optional — not all video posts are Reels)
              if is_reel or is_video:
                  reel_ins = api_get(f'/{m["id"]}/insights',
                                     optional=True,
                                     metric='plays,ig_reels_avg_watch_time',
                                     period='lifetime')
                  for item in reel_ins.get('data', []):
                      if item['name'] == 'plays':
                          post['plays'] = item.get('value', 0) or 0
                      elif item['name'] == 'ig_reels_avg_watch_time':
                          post['avg_watch_time_ms'] = item.get('value', 0) or 0

              posts.append(post)
              reel_tag = f' ▶ {post["plays"]:,} plays' if post['plays'] else ''
              print(f'  {post["date"]} {post["product_type"]}: ❤ {post["likes"]}  💬 {post["comments"]}  🔁 {post["shares"]}  📊 {post["reach"]}  👤 {post["profile_visits"]}  ➕ {post["follows"]}{reel_tag}')

          now   = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          today = datetime.date.today().isoformat()

          # ── Stories ──────────────────────────────────────────────────────────
          stories_resp = api_get(
              f'/{ig_user_id}/stories',
              optional=True,
              fields='id,caption,media_type,timestamp,permalink'
          )
          stories_raw = stories_resp.get('data', [])
          print(f'\n{len(stories_raw)} active stor{"y" if len(stories_raw)==1 else "ies"}')

          stories_log_path = pathlib.Path('data/stories.jsonl')
          seen_ids = set()
          if stories_log_path.exists():
              for line in stories_log_path.read_text().splitlines():
                  try:
                      seen_ids.add(json.loads(line).get('id', ''))
                  except Exception:
                      pass

          active_stories = []
          new_story_records = []
          for s in stories_raw:
              sid = s['id']
              story = {
                  'id':           sid,
                  'date':         s.get('timestamp', '')[:10],
                  'timestamp':    s.get('timestamp', ''),
                  'media_type':   s.get('media_type', ''),
                  'caption':      (s.get('caption') or '')[:200],
                  'url':          s.get('permalink', ''),
                  'impressions':  0,
                  'reach':        0,
                  'replies':      0,
                  'taps_forward': 0,
                  'taps_back':    0,
                  'exits':        0,
              }
              ins = api_get(f'/{sid}/insights',
                            optional=True,
                            metric='views,reach,replies,taps_forward,taps_back,exits')
              if ins.get('data'):
                  for item in ins['data']:
                      # 'impressions' was deprecated in favor of 'views' (Graph API v22, Apr 2025)
                      name = 'impressions' if item['name'] == 'views' else item['name']
                      if name in story:
                          val = item.get('value')
                          if val is None:
                              val = (item.get('total_value') or {}).get('value')
                          if val is None:
                              val = ((item.get('values') or [{}])[-1].get('value', 0))
                          story[name] = val or 0
              else:
                  print(f'    ⚠ story {sid}: no insights returned (any API error logged above)')
              active_stories.append(story)
              print(f'  {story["date"]} STORY: 👁 {story["impressions"]}  📍 {story["reach"]}  💬 {story["replies"]}  ➡ {story["taps_forward"]}  ⬅ {story["taps_back"]}  🚪 {story["exits"]}')
              if sid not in seen_ids:
                  new_story_records.append({'sync_at': now, **story})

          if new_story_records:
              with open(stories_log_path, 'a') as f:
                  for rec in new_story_records:
                      f.write(json.dumps(rec) + '\n')
              print(f'✓ Appended {len(new_story_records)} new stor{"y" if len(new_story_records)==1 else "ies"} to data/stories.jsonl')
          else:
              print('✓ No new stories to append')

          # ── Assemble output ───────────────────────────────────────────────────
          full = {
              'username':        username,
              'followers':       followers,
              'following':       following,
              'biography':       biography,
              'website':         website,
              'profile_pic':     profile_pic,
              'media_count':     len(posts),
              'posts':           posts,
              'stories':         active_stories,
              'account_metrics': acct_metrics,   # 7-day account-wide totals
              'fetched_at':      now,
          }

          # ── 1. data/latest.json  (dashboard reads this) ───────────────────────
          pathlib.Path('data').mkdir(exist_ok=True)
          with open('data/latest.json', 'w') as f:
              json.dump(full, f, indent=2)
          print(f'✓ Wrote data/latest.json')

          # ── 2. data/history.jsonl  (compact per-run log) ─────────────────────
          summary = {
              't':  now,
              'f':  followers,
              'fw': following,
              'pc': len(posts),
              'tl': max((p['likes']        for p in posts), default=0),
              'tc': max((p['comments']     for p in posts), default=0),
              'al': round(sum(p['likes']   for p in posts) / max(len(posts), 1), 1),
              'tr': sum(p['reach']         for p in posts),
              'ts': sum(p['shares']        for p in posts),
              'tp': sum(p['plays']         for p in posts),
              'tf': sum(p['follows']       for p in posts),
              'ar': acct_metrics.get('reach', 0),
              'pv': acct_metrics.get('profile_views', 0),
              'wc': acct_metrics.get('website_clicks', 0),
          }
          with open('data/history.jsonl', 'a') as f:
              f.write(json.dumps(summary) + '\n')
          print(f'✓ Appended to data/history.jsonl')

          # ── 3. data/daily/YYYY-MM-DD.json  (full daily snapshot) ─────────────
          daily_dir = pathlib.Path('data/daily')
          daily_dir.mkdir(parents=True, exist_ok=True)
          with open(daily_dir / f'{today}.json', 'w') as f:
              json.dump(full, f, indent=2)
          print(f'✓ Wrote data/daily/{today}.json')

          total_reach  = sum(p['reach']  for p in posts)
          total_shares = sum(p['shares'] for p in posts)
          total_plays  = sum(p['plays']  for p in posts)
          print(f'\nDone: {followers:,} followers · {len(posts)} posts · {total_reach:,} reach · {total_shares:,} shares · {total_plays:,} plays')
          EOF

      - name: Commit & push data
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "sync: instagram $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
          echo "changed=true" >> $GITHUB_OUTPUT

      - name: Trigger Vercel redeploy
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -s -X POST "https://api.vercel.com/v1/integrations/deploy/prj_Y7szcybuyGGlF0iauy81gpFuvk7m/yuN128bzyc"
          echo "Vercel redeploy triggered"
